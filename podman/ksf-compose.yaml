version: '3.8'

services:
  mariadb:
    image: docker.io/mariadb:10.11
    container_name: ksf-mariadb
    hostname: ksf-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-ksfroot2024!}
      MYSQL_DATABASE: ${MARIADB_DATABASE:-ksf_fa}
      MYSQL_USER: ${MARIADB_USER:-ksf_user}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:-ksfuser2024!}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d:ro
    networks:
      - ksf_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontaccounting:
    image: docker.io/genebarker/frontaccounting:latest
    container_name: ksf-fa
    hostname: ksf-fa
    command: --http
    ports:
      - "8080:80"
    networks:
      - ksf_network
    depends_on:
      mariadb:
        condition: service_healthy

  wordpress:
    image: docker.io/wordpress:6.4-php8.1-apache
    container_name: ksf-wp
    hostname: ksf-wp
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_NAME: ${MARIADB_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MARIADB_USER:-ksf_user}
      WORDPRESS_DB_PASSWORD: ${MARIADB_PASSWORD:-ksfuser2024!}
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - wp_data:/var/www/html
      - ./containerfiles/WP/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    networks:
      - ksf_network
    depends_on:
      mariadb:
        condition: service_healthy
    # WP-CLI installed via init script, not entrypoint override

networks:
  ksf_network:
    name: ksf_network
    driver: bridge

volumes:
  mariadb_data:
  fa_data:
  wp_data:

# Environment file to customize
# Copy .env.example to .env and customize
# MARIADB_ROOT_PASSWORD=your_root_password
# MARIADB_DATABASE=ksf_fa
# MARIADB_USER=ksf_user
# MARIADB_PASSWORD=your_user_password
# Optionally set for reverse proxy:
# KSF_URL=ksf.example.com  # Used for WP site URL instead of auto-detected IP