---
# KSF Infrastructure Ansible Playbook
# Sets up network, volumes, and firewall ports

- name: Setup KSF UAT Environment
  hosts: localhost
  connection: local
  become: true

  vars:
    ksf_base_dir: /opt/ksf/infrastructure/podman

  tasks:
    - name: Create podman network
      ansible.builtin.shell: podman network create ksf_network 2>/dev/null || true

    - name: Create podman volumes
      ansible.builtin.shell: |
        podman volume create ksf_mariadb_data 2>/dev/null || true
        podman volume create ksf_fa_data 2>/dev/null || true
        podman volume create ksf_wp_data 2>/dev/null || true

    - name: Open firewall ports for KSF
      ansible.builtin.shell: |
        firewall-cmd --permanent --add-port=8080/tcp 2>/dev/null || true
        firewall-cmd --permanent --add-port=8081/tcp 2>/dev/null || true
        firewall-cmd --reload 2>/dev/null || true

    - name: Display setup complete
      ansible.builtin.debug:
        msg: "KSF Setup Complete! Run: podman-compose -f /home/kevin/Documents/ksf_Infrastructure/podman/ksf-compose.yaml up -d"