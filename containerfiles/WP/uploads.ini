; KSF Custom PHP Configuration for WordPress

; File uploads
upload_max_filesize = 64M
post_max_size = 64M

; Memory
memory_limit = 256M
max_execution_time = 300

; Error reporting
display_errors = Off
log_errors = On
error_log = /var/log/apache2/php-error.log

; Date
date.timezone = UTC

; Session security
session.cookie_httponly = 1
session.use_only_cookies = 1