; KSF Custom PHP Configuration for FrontAccounting

; Memory and execution
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; File uploads
file_uploads = On
upload_max_filesize = 64M
post_max_size = 64M

; Error reporting (disable in production)
display_errors = Off
log_errors = On
error_log = /var/log/apache2/php-error.log

; Session
session.cookie_httponly = 1
session.use_only_cookies = 1
session.use_strict_mode = 1

; Additional extensions
extension = mysqli
extension = curl
extension = gd
extension = mbstring
extension = zip
extension = xml
extension = intl

; Date
date.timezone = UTC